name: SEO Morning Post Agent
import time

def call_claude(system: str, user: str, retries: int = 3) -> str:
    """Chiama l'API Anthropic e restituisce il testo della risposta."""
    payload = {
        "model": MODEL,
        "max_tokens": MAX_TOKENS,
        "system": system,
        "messages": [{"role": "user", "content": user}]
    }
    for attempt in range(retries):
        resp = requests.post(
            "https://api.anthropic.com/v1/messages",
            headers={
                "x-api-key": ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
                "content-type": "application/json"
            },
            json=payload,
            timeout=60
        )
        if resp.status_code == 529:
            wait = 10 * (attempt + 1)  # 10s, 20s, 30s
            log.warning("API sovraccarica (529), retry %d/%d tra %ds...", attempt + 1, retries, wait)
            time.sleep(wait)
            continue
        resp.raise_for_status()
        return resp.json()["content"][0]["text"]

    raise RuntimeError("API Anthropic non disponibile dopo 3 tentativi (529).")
on:
  schedule:
    - cron: '0 7 * * 1-5'  # 08:00 ora legale italiana (UTC+2), ora solare arriva alle 08:00 UTC+1
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
        run: python agent.py
