name: SEO Morning Post Agent

on:
  schedule:
    # 08:00 Europe/Rome = 06:00 UTC (ora solare) / 07:00 UTC (ora legale)
    # Usiamo 06:00 UTC per coprire entrambi i periodi (ottobre-marzo)
    # Cambia in 07:00 UTC da marzo a ottobre se vuoi orario legale esatto
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # permette run manuale dal pannello GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
      - uses: actions/setup-python@v5.6.0 
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
        run: python agent.py
